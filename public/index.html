<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e2a47">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>GOLDEN Labels & Flexible QA</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
</head>
<body>
  <!-- Login -->
  <div id="login" class="login-wrap">
    <div class="login">
      <div class="mark">G</div>
      <h1>GOLDEN Labels &amp; Flexible QA</h1>
      <p>In-Process Quality Inspection</p>

      <!-- Clerk mounts its hosted sign-in card here when Clerk is configured (cloud deploy). -->
      <div id="clerk-signin"></div>
      <div id="clerkLoading" class="hidden" style="font-size:13px;color:var(--muted);margin:8px 0">Loading sign-in…</div>

      <!-- Local / break-glass password sign-in. Primary form for the on-prem deploy; on the cloud
           deploy it is hidden behind the "Administrator sign-in" link below Clerk. -->
      <div id="pwBox">
        <div class="field"><label>Username</label><input id="loginUser" autocomplete="username" autocapitalize="none" placeholder="e.g. admin"></div>
        <div class="field"><label>Password</label><input id="loginPass" type="password" autocomplete="current-password" placeholder="Password"></div>
        <div class="row-actions" style="margin-top:16px">
          <button class="btn gold block" id="pwLogin">Sign in</button>
        </div>
        <div class="row-actions">
          <button class="btn ghost block" id="ssoLogin">Sign in with Microsoft 365</button>
        </div>
      </div>
      <p id="pwToggleWrap" class="hidden" style="margin-top:14px;font-size:12px"><a href="#" id="pwToggle" style="color:var(--muted)">Administrator / break-glass sign-in</a></p>
      <p style="margin-top:14px;font-size:12px;color:var(--muted)">Sign in with your Golden account.</p>
    </div>
  </div>

  <!-- App -->
  <div id="appwrap" class="hidden">
    <header class="topbar">
      <button class="hamburger no-print" id="navToggle" aria-label="Menu">☰</button>
      <div class="brand"><div class="mark">G</div><div><h1>GOLDEN Labels &amp; Flexible QA</h1><p>In-Process Quality Inspection</p></div></div>
      <div class="right">
        <button class="qbadge hidden no-print" id="qbadge" title="Queued changes — tap to sync now"></button>
        <span class="netdot" id="netdot" title="online"></span>
        <span class="who"><b id="whoName">-</b><span id="whoRole">-</span></span>
        <button class="btn ghost sm" id="logoutBtn">Logout</button>
      </div>
    </header>
    <div class="layout">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="scrim no-print" id="scrim"></div>
      <main id="app"></main>
    </div>
  </div>

  <div id="modalRoot"></div>
  <div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
