# Golden QA App - STANDALONE compose for a host WITHOUT Traefik (local testing / single box).
#
# Differences from docker-compose.traefik.yml:
#   - app PUBLISHES 3000:3000 directly on the host (open http://localhost:3000).
#   - no Traefik labels and no external 'web' network.
#   - db-backup is included but optional - comment it out if you don't need nightly dumps.
#
# Quick start:
#   cp .env.example .env   # then fill in DB_PASSWORD, SECRET_KEY, ADMIN_PASSWORD
#   docker compose up --build
#
# Required env (fail-fast via ${VAR:?}): DB_PASSWORD, SECRET_KEY, ADMIN_PASSWORD.
# Optional env: ADMIN_USERNAME (default 'admin'), TZ. (APP_HOST is unused here - no Traefik router.)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: goldenqa:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      # host:container - reach the app at http://localhost:3000
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://goldenqa:${DB_PASSWORD:?set DB_PASSWORD in .env}@db:5432/goldenqa
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      BACKUP_DIR: /backups
      TZ: ${TZ:-Pacific/Fiji}
    volumes:
      - goldenqa_uploads:/app/data/uploads
      - goldenqa_backups:/backups:ro

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: goldenqa
      POSTGRES_DB: goldenqa
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      TZ: ${TZ:-Pacific/Fiji}
    volumes:
      - goldenqa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldenqa -d goldenqa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Optional: nightly Postgres dumps into the goldenqa_backups volume.
  # Remove this service if you don't need backups for local testing.
  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: goldenqa
      POSTGRES_DB: goldenqa
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      TZ: ${TZ:-Pacific/Fiji}
    volumes:
      - goldenqa_backups:/backups

volumes:
  goldenqa_pgdata:
  goldenqa_uploads:
  goldenqa_backups:
