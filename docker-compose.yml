# Golden QA App - STANDALONE compose for a host WITHOUT Traefik (local testing / single box).
#
# Differences from docker-compose.traefik.yml:
#   - app PUBLISHES 3000:3000 directly on the host (open http://localhost:3000).
#   - no Traefik labels and no external 'web' network.
#   - db-backup is included but optional - comment it out if you don't need nightly dumps.
#
# Quick start:
#   cp .env.example .env   # then fill in DB_PASSWORD, SECRET_KEY, ADMIN_PASSWORD
#   docker compose up --build
#
# Required env (fail-fast via ${VAR:?}): DB_PASSWORD, SECRET_KEY, ADMIN_PASSWORD.
# Optional env: ADMIN_USERNAME (default 'admin'), TZ. (APP_HOST is unused here - no Traefik router.)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: goldenqa:latest
    # Built from source here, not pulled from a registry — always (re)build, never `docker pull`
    # (which would fail with "pull access denied"). Also disable "Re-pull image" on the stack.
    pull_policy: build
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      # host:container - reach the app at http://localhost:3000
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://goldenqa:${DB_PASSWORD:?set DB_PASSWORD in .env}@db:5432/goldenqa
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      BACKUP_DIR: /backups
      TZ: ${TZ:-Pacific/Fiji}
      # Local Active Directory sign-in (optional). Leave LDAP_ENABLED=false for local accounts only.
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_URL: ${LDAP_URL:-}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      # Manager e-mail (checklist alerts, hold/reject, digest). Set SMTP_HOST to turn it on.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      NOTIFY_EMAIL_TO: ${NOTIFY_EMAIL_TO:-}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
    volumes:
      - goldenqa_uploads:/app/data/uploads
      - goldenqa_backups:/backups:ro
    labels:
      # Let the autoheal sidecar restart this container if the image HEALTHCHECK
      # (see Dockerfile — probes /api/health/ready) reports it unhealthy.
      - "autoheal=true"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: goldenqa
      POSTGRES_DB: goldenqa
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      TZ: ${TZ:-Pacific/Fiji}
    volumes:
      - goldenqa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldenqa -d goldenqa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Optional: nightly Postgres dumps into the goldenqa_backups volume.
  # Remove this service if you don't need backups for local testing.
  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: goldenqa
      POSTGRES_DB: goldenqa
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      TZ: ${TZ:-Pacific/Fiji}
    volumes:
      - goldenqa_backups:/backups

  # Restarts any container labelled autoheal=true when Docker reports it unhealthy
  # (the app image ships a HEALTHCHECK). Needs the Docker socket to issue restarts.
  autoheal:
    image: willfarrell/autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 15
      AUTOHEAL_START_PERIOD: 60
      TZ: ${TZ:-Pacific/Fiji}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  goldenqa_pgdata:
  goldenqa_uploads:
  goldenqa_backups:
